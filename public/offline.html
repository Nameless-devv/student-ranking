<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — SRAS</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; background: #f8fafc; color: #1e293b; }
    .box { text-align: center; padding: 2rem; max-width: 400px; }
    h1 { font-size: 2rem; margin-bottom: .5rem; }
    p { color: #64748b; }
    button { margin-top: 1.5rem; padding: .75rem 2rem; background: #2563eb; color: white;
             border: none; border-radius: .5rem; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:4rem">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
